<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Food Memory Game / משחק זיכרון אוכל</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f3f7; --card-back: #3498db; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px; 
            height: 100vh; 
            overflow: hidden; 
        }

        .screen { 
            width: 100%; 
            max-width: 800px; 
            text-align: center; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
        }

        .title-container { margin-bottom: 2vh; }
        h1 { color: #2d3436; margin: 0; font-size: clamp(1.5rem, 5vw, 2.5rem); }
        .sub-title { color: #636e72; font-size: clamp(1rem, 3vw, 1.5rem); font-weight: bold; }

        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
            width: 100%; 
        }

        .lvl-btn { 
            padding: 20px 10px; 
            border: none; 
            border-radius: 20px; 
            background: white; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: transform 0.2s;
        }
        .lvl-btn:active { transform: scale(0.95); }

        #game-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            padding: 10px; 
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .stats { display: flex; gap: 10px; }
        .stat-box { background: white; padding: 5px 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.7rem; color: #636e72; font-weight: bold; display: block; }
        .stat-value { font-size: 1.2rem; color: var(--primary); font-weight: 800; }

        .nav-btn { padding: 10px 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .back-btn { background: #dfe6e9; }
        .hint-btn { background: #ffeaa7; color: #d35400; }

        #game-board { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 1.5vh; 
            width: 100%; 
            max-height: 70vh;
            margin: auto;
            padding: 10px;
        }

        .card { 
            aspect-ratio: 1/1; 
            background: var(--card-back); 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.4s; 
            position: relative; 
            transform-style: preserve-3d; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 3px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #e8f8f5 !important; border-color: var(--secondary) !important; cursor: default; }

        .emoji { font-size: clamp(1.5rem, 6vh, 3rem); }
        .word { font-size: clamp(0.6rem, 2vh, 0.9rem); font-weight: 900; margin-top: 5px; text-transform: uppercase; color: #2d3436; }

        #win-overlay { display: none; position: fixed; inset: 0; background: rgba(45, 52, 54, 0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .win-box { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <div class="title-container">
            <h1>🍎 Food Memory Game</h1>
            <div class="sub-title">משחק זיכרון אוכל</div>
        </div>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame(1)"><span class="en">Level 1</span><span class="he">רמה 1</span></button>
            <button class="lvl-btn" onclick="startGame(2)"><span class="en">Level 2</span><span class="he">רמה 2</span></button>
            <button class="lvl-btn" onclick="startGame(3)"><span class="en">Level 3</span><span class="he">רמה 3</span></button>
            <button class="lvl-btn" onclick="startGame(4)"><span class="en">Level 4</span><span class="he">רמה 4</span></button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="nav-btn back-btn" onclick="showMenu()">MENU / תפריט</button>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-label">TIME / זמן</span>
                    <span id="timer" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">SCORE / ניקוד</span>
                    <span class="stat-value"><span id="score">0</span>/<span id="total-pairs">8</span></span>
                </div>
            </div>
            <button class="nav-btn hint-btn" onclick="useHint()">HINT / רמז</button>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="win-overlay">
        <div class="win-box">
            <h2 style="color: var(--secondary); font-size: 2rem; margin:0;">EXCELLENT!</h2>
            <h3 style="margin-top:5px;">כל הכבוד!</h3>
            <p>Time / זמן: <strong><span id="final-time">0</span>s</strong></p>
            <button class="nav-btn" style="background:var(--secondary); color:white; width:100%; padding:20px; font-size:1.2rem;" onclick="resetGame()">PLAY AGAIN / שחק שוב</button>
        </div>
    </div>

    <script>
        const levels = {
            1: [{name:'Apple', emoji:'🍎'}, {name:'Banana', emoji:'🍌'}, {name:'Carrot', emoji:'🥕'}, {name:'Corn', emoji:'🌽'}, {name:'Burger', emoji:'🍔'}, {name:'Salad', emoji:'🥗'}, {name:'Ice Cream', emoji:'🍦'}, {name:'Cake', emoji:'🍰'}],
            2: [{name:'Grapes', emoji:'🍇'}, {name:'Orange', emoji:'🍊'}, {name:'Cucumber', emoji:'🥒'}, {name:'Tomato', emoji:'🍅'}, {name:'Bread', emoji:'🍞'}, {name:'Steak', emoji:'🥩'}, {name:'Cookie', emoji:'🍪'}, {name:'Candy', emoji:'🍬'}],
            3: [{name:'Pear', emoji:'🍐'}, {name:'Cherries', emoji:'🍒'}, {name:'Peas', emoji:'🫛'}, {name:'Lettuce', emoji:'🥬'}, {name:'Honey', emoji:'🍯'}, {name:'Hot Dog', emoji:'🌭'}, {name:'Pie', emoji:'🥧'}, {name:'Pineapple', emoji:'🍍'}, {name:'Egg', emoji:'🍳'}, {name:'Bagel', emoji:'🥯'}],
            4: [{name:'Blueberry', emoji:'🫐'}, {name:'Coconut', emoji:'🥥'}, {name:'Garlic', emoji:'🧄'}, {name:'Potato', emoji:'🍠'}, {name:'Dumpling', emoji:'🥟'}, {name:'Ginger', emoji:'🫚'}, {name:'Olive', emoji:'🫒'}, {name:'Beans', emoji:'🫘'}, {name:'Lime', emoji:'🍋‍🟩'}, {name:'Fortune', emoji:'🥠'}]
        };

        let currentLevel = 1, flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = true;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.7;
            window.speechSynthesis.speak(msg);
        }

        function startGame(lvl) { 
            currentLevel = lvl; 
            document.getElementById('main-menu').style.display = 'none'; 
            document.getElementById('game-screen').style.display = 'flex'; 
            resetGame(); 
        }

        function showMenu() { 
            clearInterval(timerInterval); 
            document.getElementById('main-menu').style.display = 'flex'; 
            document.getElementById('game-screen').style.display = 'none'; 
            document.getElementById('win-overlay').style.display = 'none'; 
        }

        function resetGame() {
            clearInterval(timerInterval); matchedPairs = 0; seconds = 0; flippedCards = []; canFlip = true;
            const data = levels[currentLevel];
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = data.length;
            document.getElementById('timer').innerText = '0';
            document.getElementById('win-overlay').style.display = 'none';
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // Adjust grid columns for larger levels on iPads
            board.style.gridTemplateColumns = (data.length > 8) ? "repeat(5, 1fr)" : "repeat(4, 1fr)";
            if(window.innerWidth < 500) board.style.gridTemplateColumns = "repeat(4, 1fr)";

            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.name;
                card.innerHTML = `<div class="content"><span class="emoji">${item.emoji}</span><span class="word">${item.name}</span></div>`;
                card.onclick = () => flipCard(card, item.name);
                board.appendChild(card);
            });
            timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000);
        }

        function flipCard(card, name) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            speak(name);
            if (flippedCards.length === 2) { canFlip = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.name === c2.dataset.name) {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedPairs++;
                document.getElementById('score').innerText = matchedPairs;
                flippedCards = []; canFlip = true;
                if (matchedPairs === levels[currentLevel].length) {
                    clearInterval(timerInterval);
                    setTimeout(() => { 
                        document.getElementById('final-time').innerText = seconds; 
                        document.getElementById('win-overlay').style.display = 'flex'; 
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); 
                    }, 600);
                }
            } else { setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000); }
        }

        function useHint() {
            if (!canFlip || matchedPairs === levels[currentLevel].length) return;
            seconds += 5; document.getElementById('timer').innerText = seconds;
            const allHidden = document.querySelectorAll('.card:not(.flipped):not(.matched)');
            canFlip = false; allHidden.forEach(c => c.classList.add('flipped'));
            setTimeout(() => { allHidden.forEach(c => { if(!c.classList.contains('matched')) c.classList.remove('flipped'); }); canFlip = true; }, 1200);
        }
    </script>
</body>
</html>
