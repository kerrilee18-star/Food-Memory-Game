<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Memory Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f7f7f7;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; height: 100vh; overflow: hidden;
        }

        /* Essential for iPad Audio unlock */
        #unlock-screen {
            position: fixed; inset: 0; background: #2c3e50; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .stats {
            display: flex; gap: 30px; padding: 20px; font-weight: 800;
            font-size: 1.4rem; color: #2c3e50;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 95%;
            max-width: 600px;
            perspective: 1000px;
        }

        .memory-card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .memory-card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid white;
        }

        /* The "Hidden" side */
        .card-back {
            background: #2c3e50;
            color: white;
            font-size: 2.5rem;
        }

        /* The "Food" side */
        .card-front {
            background: white;
            transform: rotateY(180deg);
        }

        .emoji { font-size: 3rem; }
        .name-en { font-weight: 800; font-size: 1rem; color: #2c3e50; margin-top: 5px; }
        .name-he { font-weight: 400; font-size: 0.9rem; color: #e67e22; }

        .btn-start {
            background: #e67e22; color: white; border: none;
            padding: 20px 50px; border-radius: 15px; font-size: 1.8rem;
            font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #a05817;
        }

        #win-modal {
            position: fixed; inset: 0; background: rgba(44, 62, 80, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="unlock-screen">
        <h1>Food Memory Game</h1>
        <button class="btn-start" onclick="initGame()">START</button>
    </div>

    <div class="stats">
        <span id="match-text">Matches: 0/8</span>
        <span id="timer-text">00:00</span>
    </div>

    <div id="game-grid"></div>

    <div id="win-modal">
        <h1 style="font-size: 3rem;">EXCELLENT!</h1>
        <h2 style="font-size: 2rem;">כל הכבוד</h2>
        <button class="btn-start" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const foods = [
            {e:"🍎", n:"Apple", h:"תפוח"}, {e:"🍕", n:"Pizza", h:"פיצה"},
            {e:"🍔", n:"Burger", h:"המבורגר"}, {e:"🍦", n:"Ice Cream", h:"גלידה"},
            {e:"🍌", n:"Banana", h:"בננה"}, {e:"🥪", n:"Sandwich", h:"כריך"},
            {e:"🥕", n:"Carrot", h:"גזר"}, {e:"🍳", n:"Egg", h:"ביצה"}
        ];

        let deck = [...foods, ...foods];
        let choiceA = null, choiceB = null;
        let busy = false;
        let matches = 0;
        let time = 0;

        function playSound(txt) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function initGame() {
            // Unlock Audio context
            playSound(""); 
            document.getElementById('unlock-screen').style.display = 'none';
            
            const grid = document.getElementById('game-grid');
            deck.sort(() => Math.random() - 0.5);

            deck.forEach(item => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.innerHTML = `
                    <div class="card-back">?</div>
                    <div class="card-front">
                        <div class="emoji">${item.e}</div>
                        <div class="name-en">${item.n}</div>
                        <div class="name-he">${item.h}</div>
                    </div>
                `;
                card.dataset.name = item.n;
                card.onclick = () => flip(card);
                grid.appendChild(card);
            });

            setInterval(() => {
                time++;
                let m = Math.floor(time/60).toString().padStart(2,'0');
                let s = (time%60).toString().padStart(2,'0');
                document.getElementById('timer-text').innerText = `${m}:${s}`;
            }, 1000);
        }

        function flip(card) {
            if (busy || card.classList.contains('flipped')) return;

            card.classList.add('flipped');
            playSound(card.dataset.name);

            if (!choiceA) {
                choiceA = card;
            } else {
                choiceB = card;
                check();
            }
        }

        function check() {
            busy = true;
            if (choiceA.dataset.name === choiceB.dataset.name) {
                matches++;
                document.getElementById('match-text').innerText = `Matches: ${matches}/8`;
                choiceA = null; choiceB = null; busy = false;

                if (matches === 8) {
                    // 3 second delay to look at the board
                    setTimeout(() => {
                        confetti();
                        document.getElementById('win-modal').style.display = 'flex';
                    }, 3000);
                }
            } else {
                setTimeout(() => {
                    choiceA.classList.remove('flipped');
                    choiceB.classList.remove('flipped');
                    choiceA = null; choiceB = null; busy = false;
                }, 1000);
            }
        }
    </script>
</body>
</html>
