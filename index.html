<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Memory Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f3f7;
            --card-back: #3498db;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .screen { width: 100%; max-width: 650px; text-align: center; }

        /* Menu Styling */
        h1 { color: #2d3436; margin-bottom: 5px; }
        .subtitle { margin-bottom: 25px; color: #636e72; font-weight: bold; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lvl-btn {
            padding: 20px; border: none; border-radius: 15px; background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }
        .lvl-btn:hover { transform: translateY(-3px); background: var(--primary); color: white; }
        .lvl-btn .en { font-size: 1.2rem; font-weight: bold; }
        .lvl-btn .he { font-size: 0.9rem; opacity: 0.8; }

        /* Game Header */
        #game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .stats { display: flex; gap: 10px; }
        .stat-box { background: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .back-btn { background: #dfe6e9; }
        .hint-btn { background: #ffeaa7; color: #d35400; }

        /* Board Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; transition: 0.3s; }
        .grid.large { grid-template-columns: repeat(5, 1fr); }

        .card { 
            aspect-ratio: 1/1.2; background: var(--card-back); border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.4s; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; padding: 5px; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 3px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #e8f8f5; border-color: var(--secondary); cursor: default; }

        .emoji { font-size: 2.2rem; }
        .word { font-size: 0.65rem; font-weight: bold; margin-top: 5px; text-transform: uppercase; color: #333; word-break: break-word; }

        /* Win Message Pop-up */
        #win-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
        }
        .win-box { 
            background: white; padding: 40px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.5); } to { transform: scale(1); } }
        .play-again-btn { background: var(--secondary); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; font-weight: bold; }

        @media (max-width: 500px) {
            .grid.large { grid-template-columns: repeat(4, 1fr); }
            .emoji { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>🍎 Food Memory Game</h1>
        <p class="subtitle">Select a level / בחר רמה</p>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame(1)"><span class="en">Level 1</span><span class="he">רמה 1</span></button>
            <button class="lvl-btn" onclick="startGame(2)"><span class="en">Level 2</span><span class="he">רמה 2</span></button>
            <button class="lvl-btn" onclick="startGame(3)"><span class="en">Level 3</span><span class="he">רמה 3</span></button>
            <button class="lvl-btn" onclick="startGame(4)"><span class="en">Level 4</span><span class="he">רמה 4</span></button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="nav-btn back-btn" onclick="showMenu()">⬅ Menu</button>
            <div class="stats">
                <div class="stat-box">🕒 <span id="timer">0</span>s</div>
                <div class="stat-box">⭐ <span id="score">0</span>/<span id="total-pairs">8</span></div>
            </div>
            <button class="nav-btn hint-btn" onclick="useHint()">💡 Hint (+5s)</button>
        </div>
        <div id="game-board" class="grid"></div>
    </div>

    <div id="win-overlay">
        <div class="win-box">
            <h2>🎉 AWESOME! 🎉</h2>
            <p>You finished in <span id="final-time">0</span> seconds!</p>
            <button class="play-again-btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const levels = {
            1: [
                {name:'Apple', emoji:'🍎'}, {name:'Banana', emoji:'🍌'}, {name:'Carrot', emoji:'🥕'}, {name:'Corn', emoji:'🌽'},
                {name:'Hamburger', emoji:'🍔'}, {name:'Salad', emoji:'🥗'}, {name:'Ice Cream', emoji:'🍦'}, {name:'Cake', emoji:'🍰'}
            ],
            2: [
                {name:'Grapes', emoji:'🍇'}, {name:'Orange', emoji:'🍊'}, {name:'Cucumber', emoji:'🥒'}, {name:'Tomato', emoji:'🍅'},
                {name:'Bread', emoji:'🍞'}, {name:'Steak', emoji:'🥩'}, {name:'Cookie', emoji:'🍪'}, {name:'Candy', emoji:'🍬'}
            ],
            3: [
                {name:'Pear', emoji:'🍐'}, {name:'Cherries', emoji:'🍒'}, {name:'Peas', emoji:'🫛'}, {name:'Lettuce', emoji:'🥬'},
                {name:'Butter', emoji:'🧈'}, {name:'Hot Dog', emoji:'🌭'}, {name:'Pie', emoji:'🥧'}, {name:'Pineapple', emoji:'🍍'},
                {name:'Fried Egg', emoji:'🍳'}, {name:'Bagel', emoji:'🥯'}
            ],
            4: [
                {name:'Blueberries', emoji:'🫐'}, {name:'Coconut', emoji:'🥥'}, {name:'Garlic', emoji:'🧄'}, {name:'Sweet Potato', emoji:'🥔'},
                {name:'Dumpling', emoji:'🥟'}, {name:'Ginger', emoji:'🫚'}, {name:'Peanuts', emoji:'🥜'}, {name:'Red Beans', emoji:'🫘'},
                {name:'Croissant', emoji:'🥐'}, {name:'Fortune Cookie', emoji:'🥠'}
            ]
        };

        let currentLevel = 1, flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = true;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function showMenu() {
            clearInterval(timerInterval);
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('win-overlay').style.display = 'none';
        }

        function startGame(lvl) {
            currentLevel = lvl;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            resetGame();
        }

        function resetGame() {
            clearInterval(timerInterval);
            matchedPairs = 0; seconds = 0; flippedCards = []; canFlip = true;
            
            const data = levels[currentLevel];
            const totalPairs = data.length;
            
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = totalPairs;
            document.getElementById('timer').innerText = '0';
            document.getElementById('win-overlay').style.display = 'none';
            
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // Adjust grid for 20-card levels
            if(totalPairs > 8) board.classList.add('large');
            else board.classList.remove('large');
            
            // SHUFFLE LOGIC
            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.name = item.name;
                card.innerHTML = `<div class="content"><span class="emoji">${item.emoji}</span><span class="word">${item.name}</span></div>`;
                card.onclick = () => flipCard(card, item.name);
                board.appendChild(card);
            });

            timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000);
        }

        function flipCard(card, name) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            speak(name);
            if (flippedCards.length === 2) { canFlip = false; checkMatch(); }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            const target = levels[currentLevel].length;
            
            if (c1.dataset.name === c2.dataset.name) {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedPairs++;
                document.getElementById('score').innerText = matchedPairs;
                flippedCards = []; canFlip = true;
                if (matchedPairs === target) winGame();
            } else {
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000);
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('final-time').innerText = seconds;
            document.getElementById('win-overlay').style.display = 'flex';
            speak("Good Job! You finished the level!");
        }

        function useHint() {
            if (!canFlip) return;
            seconds += 5;
            document.getElementById('timer').innerText = seconds;
            const allHidden = document.querySelectorAll('.card:not(.flipped):not(.matched)');
            canFlip = false;
            allHidden.forEach(c => c.classList.add('flipped'));
            setTimeout(() => {
                allHidden.forEach(c => { if(!c.classList.contains('matched')) c.classList.remove('flipped'); });
                canFlip = true;
                flippedCards = [];
            }, 1500);
        }
    </script>
</body>
</html>
