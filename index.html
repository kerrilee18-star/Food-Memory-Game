<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Memory Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f3f7;
            --card-back: #3498db;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        .screen { width: 100%; max-width: 650px; text-align: center; }
        h1 { color: #2d3436; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { margin-bottom: 25px; color: #636e72; font-weight: bold; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lvl-btn {
            padding: 20px; border: none; border-radius: 15px; background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }
        .lvl-btn:hover { transform: translateY(-3px); background: var(--primary); color: white; }
        .lvl-btn .en { font-size: 1.2rem; font-weight: bold; }
        .lvl-btn .he { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }

        #game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; gap: 10px; }
        .stats { display: flex; gap: 8px; flex-grow: 1; justify-content: center; }
        .stat-box { background: white; padding: 5px 10px; border-radius: 10px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; min-width: 80px; }
        .stat-label { font-size: 0.65rem; color: #636e72; margin-bottom: 2px; }
        .stat-value { font-size: 1rem; color: var(--primary); }

        .nav-btn { padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .back-btn { background: #dfe6e9; font-size: 0.75rem;}
        .hint-btn { background: #ffeaa7; color: #d35400; font-size: 0.75rem;}

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; transition: 0.3s; width: 100%; }
        .grid.large { grid-template-columns: repeat(5, 1fr); }

        .card { 
            aspect-ratio: 1/1.2; background: var(--card-back); border-radius: 12px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.4s; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card .content { display: none; flex-direction: column; align-items: center; width: 100%; padding: 5px; }
        .card.flipped { background: white; transform: rotateY(180deg); border: 3px solid var(--primary); }
        .card.flipped .content { display: flex; transform: rotateY(180deg); }
        .card.matched { background: #e8f8f5; border-color: var(--secondary); cursor: default; opacity: 0.8; }

        .emoji { font-size: 2.2rem; }
        .word { font-size: 0.7rem; font-weight: bold; margin-top: 5px; text-transform: uppercase; color: #333; }

        #win-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
        }
        .win-box { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 90%; }
        .play-again-btn { background: var(--secondary); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.2rem; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>🍎 Food Memory Game</h1>
        <h3>משחק זיכרון אוכל</h3>
        <p class="subtitle">Select a level / בחר רמה</p>
        <div class="menu-grid">
            <button class="lvl-btn" onclick="startGame(1)"><span class="en">Level 1</span><span class="he">רמה 1</span></button>
            <button class="lvl-btn" onclick="startGame(2)"><span class="en">Level 2</span><span class="he">רמה 2</span></button>
            <button class="lvl-btn" onclick="startGame(3)"><span class="en">Level 3</span><span class="he">רמה 3</span></button>
            <button class="lvl-btn" onclick="startGame(4)"><span class="en">Level 4</span><span class="he">רמה 4</span></button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="game-header">
            <button class="nav-btn back-btn" onclick="showMenu()"><span>⬅ Menu</span><span>תפריט</span></button>
            <div class="stats">
                <div class="stat-box"><span class="stat-label">🕒 Time / זמן</span><span id="timer" class="stat-value">0</span></div>
                <div class="stat-box"><span class="stat-label">⭐ Score / ניקוד</span><span class="stat-value"><span id="score">0</span>/<span id="total-pairs">8</span></span></div>
            </div>
            <button class="nav-btn hint-btn" onclick="useHint()"><span>💡 Hint</span><span>רמז</span></button>
        </div>
        <div id="game-board" class="grid"></div>
    </div>

    <div id="win-overlay">
        <div class="win-box">
            <h2>🎉 GOOD JOB! 🎉</h2>
            <p>Your Time: <span id="final-time">0</span>s</p>
            <div id="new-best" style="display:none; color: gold; font-weight: bold; margin: 10px 0;">🏆 NEW BEST SCORE! / שיא חדש! 🏆</div>
            <div style="font-weight:bold; color: var(--secondary);">Personal Best / שיא אישי: <span id="record-display">--</span>s</div>
            <button class="play-again-btn" onclick="resetGame()">Play Again / שחק שוב</button>
        </div>
    </div>

    <script>
        const levels = {
            1: [{name:'Apple', emoji:'🍎'}, {name:'Banana', emoji:'🍌'}, {name:'Carrot', emoji:'🥕'}, {name:'Corn', emoji:'🌽'}, {name:'Hamburger', emoji:'🍔'}, {name:'Salad', emoji:'🥗'}, {name:'Ice Cream', emoji:'🍦'}, {name:'Cake', emoji:'🍰'}],
            2: [{name:'Grapes', emoji:'🍇'}, {name:'Orange', emoji:'🍊'}, {name:'Cucumber', emoji:'🥒'}, {name:'Tomato', emoji:'🍅'}, {name:'Bread', emoji:'🍞'}, {name:'Steak', emoji:'🥩'}, {name:'Cookie', emoji:'🍪'}, {name:'Candy', emoji:'🍬'}],
            3: [{name:'Pear', emoji:'🍐'}, {name:'Cherries', emoji:'🍒'}, {name:'Peas', emoji:'🫛'}, {name:'Lettuce', emoji:'🥬'}, {name:'Honey', emoji:'🍯'}, {name:'Hot Dog', emoji:'🌭'}, {name:'Pie', emoji:'🥧'}, {name:'Pineapple', emoji:'🍍'}, {name:'Fried Egg', emoji:'🍳'}, {name:'Bagel', emoji:'🥯'}],
            4: [{name:'Blueberries', emoji:'🫐'}, {name:'Coconut', emoji:'🥥'}, {name:'Garlic', emoji:'🧄'}, {name:'Sweet Potato', emoji:'🍠'}, {name:'Dumpling', emoji:'🥟'}, {name:'Ginger', emoji:'🫚'}, {name:'Olive', emoji:'🫒'}, {name:'Red Beans', emoji:'🫘'}, {name:'Lime', emoji:'🍋‍🟩'}, {name:'Fortune Cookie', emoji:'🥠'}]
        };

        let currentLevel = 1, flippedCards = [], matchedPairs = 0, seconds = 0, timerInterval, canFlip = true, selectedVoice = null;

        function loadVoices() {
            let voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices.find(v => v.lang === 'en-US');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text) {
            window.speechSynthesis.cancel();
            
            // Punctuation Cadence for sharp 'T' and 'K' sounds
            const naturalText = text + ", .";

            const msg = new SpeechSynthesisUtterance(naturalText);
            msg.lang = 'en-US';
            if (selectedVoice) msg.voice = selectedVoice;
            
            msg.rate = 0.72; // Slightly slower for clear consonants
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function startGame(lvl) {
            currentLevel = lvl;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            resetGame();
        }

        function showMenu() {
            clearInterval(timerInterval);
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('win-overlay').style.display = 'none';
        }

        function resetGame() {
            clearInterval(timerInterval);
            matchedPairs = 0; seconds = 0; flippedCards = []; canFlip = true;
            const data = levels[currentLevel];
            document.getElementById('score').innerText = '0';
            document.getElementById('total-pairs').innerText = data.length;
            document.getElementById('timer').innerText = '0';
            document.getElementById('win-overlay').style.display = 'none';
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            board.className = data.length > 8 ? 'grid large' : 'grid';
            const cardsData = [...data, ...data].sort(() => Math.random() - 0.5);
            cardsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = item.name;
                card.innerHTML = `<div class="content"><span class="emoji">${item.emoji}</span><span class="word">${item.name}</span></div>`;
                card.onclick = () => {
                    if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                    card.classList.add('flipped');
                    flippedCards.push(card);
                    speak(item.name);
                    if (flippedCards.length === 2) { 
                        canFlip = false; 
                        const [c1, c2] = flippedCards;
                        if (c1.dataset.name === c2.dataset.name) {
                            c1.classList.add('matched'); c2.classList.add('matched');
                            matchedPairs++;
                            document.getElementById('score').innerText = matchedPairs;
                            flippedCards = []; canFlip = true;
                            if (matchedPairs === data.length) handleWin();
                        } else {
                            setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; canFlip = true; }, 1000);
                        }
                    }
                };
                board.appendChild(card);
            });
            timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000);
        }

        function handleWin() {
            clearInterval(timerInterval);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            const key = `food_best_${currentLevel}`;
            let best = localStorage.getItem(key);
            let isNew = !best || seconds < parseInt(best);
            if(isNew) { localStorage.setItem(key, seconds); best = seconds; }
            document.getElementById('final-time').innerText = seconds;
            document.getElementById('record-display').innerText = best;
            document.getElementById('new-best').style.display = isNew ? 'block' : 'none';
            document.getElementById('win-overlay').style.display = 'flex';
            speak("Good job!");
        }

        function useHint() {
            if (!canFlip) return;
            seconds += 5; document.getElementById('timer').innerText = seconds;
            const allHidden = document.querySelectorAll('.card:not(.flipped):not(.matched)');
            canFlip = false;
            allHidden.forEach(c => c.classList.add('flipped'));
            setTimeout(() => {
                allHidden.forEach(c => { if(!c.classList.contains('matched')) c.classList.remove('flipped'); });
                canFlip = true;
            }, 1500);
        }
    </script>
</body>
</html>
