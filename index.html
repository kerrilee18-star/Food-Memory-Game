<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Memory Match</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Assistant:wght@600;800&display=swap');

        :root {
            --navy: #2c3e50;
            --gold: #b8860b;
            --apple: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #fdf6e3;
            background-image: linear-gradient(rgba(253, 246, 227, 0.9), rgba(253, 246, 227, 0.9)), 
                              url('https://www.transparenttextures.com/patterns/pantry.png');
            display: flex; flex-direction: column; align-items: center;
            margin: 0; height: 100vh; overflow: hidden;
        }

        #unlock-screen, #win-modal {
            position: fixed; inset: 0; background: var(--navy); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .stats-bar {
            display: flex; gap: 20px; padding: 10px; font-weight: bold; color: var(--navy);
            font-size: 1.2rem;
        }

        /* The Grid */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 95%;
            max-width: 600px;
            perspective: 1000px;
        }

        /* Card Styling */
        .memory-card {
            aspect-ratio: 1/1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .memory-card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border: 3px solid white;
        }

        .card-back {
            background: var(--navy);
            color: white;
            font-size: 2rem;
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
        }

        .food-emoji { font-size: 3rem; }
        .food-name { 
            font-size: 0.9rem; 
            font-weight: 800; 
            margin-top: 5px; 
            color: var(--navy); 
            text-transform: uppercase;
        }

        .btn-main {
            background: var(--gold); color: white; border: none;
            padding: 15px 40px; border-radius: 12px; font-size: 1.5rem; 
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #8a6509;
        }

        h2 { margin: 10px 0; }
    </style>
</head>
<body>

    <div id="unlock-screen">
        <h1>Food Memory Game</h1>
        <h2>משחק הזיכרון: אוכל</h2>
        <button class="btn-main" onclick="startGame()">START / התחל</button>
    </div>

    <div class="stats-bar">
        <div id="matches">Matches: 0/8</div>
        <div id="timer">Time: 00:00</div>
    </div>

    <div id="game-grid"></div>

    <div id="win-modal" style="display:none;">
        <h1 style="font-size: 3rem; color: var(--gold);">EXCELLENT!</h1>
        <h2>כל הכבוד</h2>
        <button class="btn-main" onclick="location.reload()">PLAY AGAIN / שחק שוב</button>
    </div>

    <script>
        const foodItems = [
            {e:"🍎", n:"Apple", h:"תפוח"}, {e:"🍕", n:"Pizza", h:"פיצה"},
            {e:"🍔", n:"Burger", h:"המבורגר"}, {e:"🍦", n:"Ice Cream", h:"גלידה"},
            {e:"🍌", n:"Banana", h:"בננה"}, {e:"🥪", n:"Sandwich", h:"כריך"},
            {e:"🥕", n:"Carrot", h:"גזר"}, {e:"🍳", n:"Egg", h:"ביצה"}
        ];

        let cards = [...foodItems, ...foodItems];
        let flippedCards = [];
        let matchedCount = 0;
        let lockBoard = false;
        let seconds = 0;
        let timerRef;

        function startGame() {
            document.getElementById('unlock-screen').style.display = 'none';
            shuffle(cards);
            createBoard();
            startTimer();
        }

        function shuffle(array) {
            array.sort(() => Math.random() - 0.5);
        }

        function startTimer() {
            timerRef = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                let s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `Time: ${m}:${s}`;
            }, 1000);
        }

        function createBoard() {
            const grid = document.getElementById('game-grid');
            cards.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.name = item.n;
                card.innerHTML = `
                    <div class="card-back">?</div>
                    <div class="card-front">
                        <div class="food-emoji">${item.e}</div>
                        <div class="food-name">${item.n}</div>
                        <div class="food-name" style="font-weight:400; font-size:0.7rem;">${item.h}</div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === flippedCards[0]) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            lockBoard = true;
            let isMatch = flippedCards[0].dataset.name === flippedCards[1].dataset.name;

            if (isMatch) {
                matchedCount++;
                document.getElementById('matches').innerText = `Matches: ${matchedCount}/8`;
                resetTurn();
                if (matchedCount === 8) {
                    clearInterval(timerRef);
                    // 3 Second delay so they see the final match
                    setTimeout(() => {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        document.getElementById('win-modal').style.display = 'flex';
                    }, 3000);
                }
            } else {
                setTimeout(() => {
                    flippedCards[0].classList.remove('flipped');
                    flippedCards[1].classList.remove('flipped');
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() {
            flippedCards = [];
            lockBoard = false;
        }
    </script>
</body>
</html>
